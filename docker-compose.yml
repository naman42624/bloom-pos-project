# ============================================================
# BloomCart POS — Docker Compose (Development)
# ============================================================
# Start everything: docker compose up -d
# Logs:            docker compose logs -f api
# Stop:            docker compose down
# Reset DB:        docker compose down -v && docker compose up -d
# ============================================================

services:
  # ─── PostgreSQL Database ─────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: bloomcart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bloomcart
      POSTGRES_PASSWORD: bloomcart_dev_2026
      POSTGRES_DB: bloomcart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloomcart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bloomcart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Server ──────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bloomcart-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://bloomcart:bloomcart_dev_2026@db:5432/bloomcart
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production-64-chars-minimum-required-here!!
      JWT_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
